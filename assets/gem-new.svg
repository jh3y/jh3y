<svg class="gem" width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .gem { color: red; }

    .gem__bottom {
      transform-box: fill-box;
      transform-origin: center;
    }

    .gem__bottom--top {
      --to: 360deg;
      --spin: 90deg;
      transform: scaleY(-1);
    }

    @media (prefers-reduced-motion: no-preference) {
      .gem__bottom {
        animation: spin 30s infinite linear;
      }
    }

    @keyframes spin-less {
      to {
        rotate: var(--spin, -90deg);
      }
    }
    @keyframes spin {
      to {
        rotate: var(--to, -360deg);
      }
    }
  </style>
</defs>
